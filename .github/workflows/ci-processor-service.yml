name: CI - processor-service

on:
  push:
    branches: [main]
    paths:
      - 'processor-service/**'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'processor-service/**'
      - 'pom.xml'

env:
  SERVICE_NAME: processor-service
  IMAGE_NAME: vinayakreddy07/observaflow-processor
  JAVA_VERSION: '21'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn -pl ${{ env.SERVICE_NAME }} -am test -B

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.SERVICE_NAME }}/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.SHA_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Print image info
        run: |
          echo "Image: ${{ env.IMAGE_NAME }}"
          echo "Tag:   ${{ steps.tag.outputs.SHA_TAG }}"