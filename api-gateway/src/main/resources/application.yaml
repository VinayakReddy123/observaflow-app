spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: ingest-service
          uri: http://localhost:8082
          predicates:
            - Path=/ingest/**

        - id: processor-service
          uri: http://localhost:8083
          predicates:
            - Path=/processor/**

        - id: alert-service
          uri: http://localhost:8084
          predicates:
            - Path=/alert/**

        - id: websocket-service
          uri: http://localhost:8085
          predicates:
            - Path=/ws/**

server:
  port: 8080

